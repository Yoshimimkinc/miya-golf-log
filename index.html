<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Miya Golf Log</title>
<style>
:root{--bg:#f5f7f5;--card:#fff;--line:#cdd9cd;--main:#16733a;--main2:#e8f6ed;--txt:#142414;--sub:#607560;--warn:#9b3b22;--blue:#1b6694;--gold:#806000;--r:16px;--tap:52px}*{box-sizing:border-box}html{-webkit-text-size-adjust:100%}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans JP",sans-serif;background:var(--bg);color:var(--txt);font-size:16px}button,input,select,textarea{font:inherit}.app{max-width:480px;margin:0 auto;min-height:100vh}.screen{display:none;min-height:100vh;padding:22px 18px 34px}.screen.active{display:block}.top{padding-top:34px}.label{font-size:12px;font-weight:800;letter-spacing:.14em;color:var(--main);text-transform:uppercase}.title{font-size:42px;font-weight:900;line-height:1;margin:8px 0 18px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.08)}.wide{grid-column:1/-1}.k{font-size:12px;color:var(--sub);font-weight:800;letter-spacing:.08em}.v{font-size:31px;font-weight:900;color:var(--main);line-height:1.1;margin-top:6px}.small{font-size:12px;color:var(--sub);line-height:1.5}.btn{width:100%;min-height:var(--tap);border:0;border-radius:14px;background:var(--main);color:white;font-weight:800;padding:12px 14px;margin:8px 0;box-shadow:0 1px 5px rgba(0,0,0,.12)}.btn.secondary{background:#fff;color:var(--txt);border:1px solid var(--line)}.btn.danger{background:#fff;color:var(--warn);border:1px solid #e2b5a7}.row{display:flex;gap:10px;align-items:center}.row>*{flex:1}.head{display:flex;gap:10px;align-items:center;margin:28px 0 18px}.back{width:52px;min-width:52px;height:52px;border:1px solid var(--line);border-radius:12px;background:#fff;font-size:22px}.h1{font-size:24px;font-weight:900}.field{margin:14px 0}.field label{display:block;font-size:12px;font-weight:800;color:var(--sub);letter-spacing:.1em;margin-bottom:7px;text-transform:uppercase}.input{display:block;width:100%;min-height:52px;height:52px;border:1.5px solid var(--line);border-radius:12px;background:#fff;padding:0 12px;color:var(--txt);font-size:16px;line-height:52px;text-align:left;-webkit-appearance:none;appearance:none}.date-input{letter-spacing:.02em}select.input{line-height:normal;padding-right:38px}textarea.input{height:116px;padding:12px;line-height:1.5}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{border:1.5px solid var(--line);background:#fff;border-radius:999px;min-height:42px;padding:8px 12px;color:var(--sub)}.chip.on{background:var(--main2);border-color:var(--main);color:var(--main);font-weight:800}.round{display:flex;justify-content:space-between;gap:12px;align-items:center;margin:9px 0}.score{font-size:30px;font-weight:900}.badge{display:inline-block;font-size:11px;font-weight:800;border-radius:999px;background:var(--main2);color:var(--main);padding:2px 8px;border:1px solid #acd8b9}.mantra{background:var(--main2);border:1px solid #acd8b9;border-radius:14px;padding:12px;margin:0 0 12px}.mantra .t{font-weight:900;line-height:1.5}.holebar{display:flex;justify-content:space-between;align-items:flex-end;background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px}.holeNo{font-size:54px;font-weight:900;line-height:.9}.par{font-size:25px;font-weight:900;color:var(--sub)}.progress{display:flex;gap:3px;margin:8px 0 12px}.seg{height:6px;flex:1;background:var(--line);border-radius:9px}.seg.done{background:var(--main)}.seg.now{background:var(--gold)}.bigbox{background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden;margin:12px 0}.boxlabel{font-size:12px;color:var(--sub);font-weight:900;letter-spacing:.12em;padding:12px 14px 0}.display{text-align:center;padding:18px 12px}.name{font-size:44px;font-weight:900;line-height:1;color:var(--txt)}.rel{color:var(--sub);font-size:14px;margin-top:5px}.twobtn{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--line)}.twobtn button{min-height:58px;border:0;background:#fff;font-weight:900;font-size:24px}.twobtn button:first-child{border-right:1px solid var(--line);color:var(--blue)}.twobtn button:last-child{color:var(--warn)}.mini{display:grid;grid-template-columns:1fr 1fr;gap:10px}.count{text-align:center}.count .num{font-size:32px;font-weight:900}.nav{display:flex;gap:10px;position:sticky;bottom:0;background:linear-gradient(transparent,var(--bg) 24%);padding-top:20px}.table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden}.table th,.table td{border:1px solid var(--line);padding:6px 3px;text-align:center;font-size:12px}.table th{background:#edf2ed;color:var(--sub)}.u{color:var(--blue);font-weight:900}.o{color:var(--warn);font-weight:900}.d{color:#a01818;font-weight:900}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#142414;color:#fff;padding:10px 14px;border-radius:999px;font-size:13px;opacity:0;pointer-events:none;transition:.2s}.toast.show{opacity:1}.note{height:110px}.muted{opacity:.55}
</style>
</head>
<body>
<div class="app">
<section id="home" class="screen active top">
  <div class="label">Golf Log</div><div class="title">MIYA<br><span style="color:var(--main)">GOLF</span></div>
  <div class="grid">
    <div class="card"><div class="k">ベスト</div><div id="best" class="v">--</div><div id="bestSub" class="small">まだ記録なし</div></div>
    <div class="card"><div class="k">直近5回平均</div><div id="avg5" class="v">--</div><div class="small">保存履歴から</div></div>
    <div class="card wide"><div class="k">今月のラウンド</div><div id="monthCount" class="v">0</div><div id="monthSub" class="small">--</div></div>
  </div>
  <div class="card" style="margin-top:14px"><div class="k">直近のラウンド</div><div id="recent"></div></div>
  <button class="btn" onclick="newRound()">⛳ 新しいラウンドを始める</button>
  <button class="btn secondary" onclick="exportAllMd()">📝 全履歴Markdownコピー</button>
</section>
<section id="start" class="screen">
  <div class="head"><button class="back" onclick="show('home')">←</button><div class="h1">ラウンド開始</div></div>
  <div class="field"><label>日付</label><input id="rDate" class="input date-input" type="text" inputmode="numeric" placeholder="YYYY-MM-DD"></div>
  <div class="field"><label>ゴルフ場</label><select id="course" class="input" onchange="fillLayouts()"></select></div>
  <div class="field"><label>レイアウト</label><select id="layout" class="input" onchange="previewPar()"></select><div id="parPreview" class="small" style="margin-top:6px"></div></div>
  <div class="field"><label>種別</label><select id="type" class="input"><option>練習</option><option>コンペ</option></select></div>
  <div class="field"><label>同伴者</label><input id="partners" class="input" placeholder="例: 佐藤, 高林, 岩田"></div>
  <div class="field"><label>マントラ編集 1行ずつ</label><textarea id="mantraText" class="input"></textarea><div class="row"><button class="btn secondary" onclick="renderChips()">反映</button><button class="btn secondary" onclick="resetMantras()">基本に戻す</button></div></div>
  <div class="field"><label>今日使うマントラ</label><div id="chips" class="chips"></div></div>
  <button class="btn" onclick="startRound()">スコア入力へ →</button>
</section>
<section id="play" class="screen">
  <div class="mantra"><div class="label">Today's Mantra</div><div id="mantraNow" class="t">--</div></div>
  <div class="holebar"><div><div class="label">HOLE</div><div id="holeNo" class="holeNo">1</div></div><div style="text-align:right"><div id="holePar" class="par">Par 4</div><div id="side" class="small">OUT</div></div></div>
  <div id="prog" class="progress"></div>
  <div class="bigbox"><div class="boxlabel">スコア</div><div class="display"><div id="scoreName" class="name">PAR</div><div id="scoreRel" class="rel">±0</div></div><div class="twobtn"><button onclick="chgScore(-1)">▲ アンダー</button><button onclick="chgScore(1)">オーバー ▼</button></div></div>
  <div class="bigbox"><div class="boxlabel">パット数</div><div class="display"><span id="putts" class="name" style="font-size:38px">2</span><span class="rel"> パット</span></div><div class="twobtn"><button onclick="chg('putts',-1)">－</button><button onclick="chg('putts',1)">＋</button></div></div>
  <div class="mini"><div class="bigbox count"><div class="boxlabel">OB</div><div class="num" id="ob">0</div><div class="twobtn"><button onclick="chg('ob',-1)">－</button><button onclick="chg('ob',1)">＋</button></div></div><div class="bigbox count"><div class="boxlabel">ワンペナ</div><div class="num" id="pen">0</div><div class="twobtn"><button onclick="chg('pen',-1)">－</button><button onclick="chg('pen',1)">＋</button></div></div></div>
  <div class="nav"><button class="btn secondary" onclick="prevHole()">← 戻る</button><button id="nextBtn" class="btn" onclick="nextHole()">次へ →</button></div>
</section>
<section id="done" class="screen">
  <div class="head"><button class="back" onclick="show('home')">←</button><div class="h1">ラウンド完了</div></div>
  <div class="grid"><div class="card"><div class="k">OUT</div><div id="outT" class="v">--</div></div><div class="card"><div class="k">IN</div><div id="inT" class="v">--</div></div><div class="card wide"><div class="k">GROSS</div><div id="grossT" class="v">--</div><div id="doneSub" class="small"></div></div></div>
  <div class="card" style="margin-top:14px"><div class="k">Score Card</div><div id="scoreCard"></div></div>
  <div class="field"><label>反省メモ</label><textarea id="memo" class="input note" placeholder="今日の良かった点、課題、次回マントラなど"></textarea></div>
  <button class="btn" onclick="saveRound()">💾 この端末に保存</button>
  <button class="btn secondary" onclick="copyMd()">📝 Obsidian Markdownコピー</button>
  <button class="btn secondary" onclick="downloadMd()">⬇️ .md書き出し</button>
</section>
</div><div id="toast" class="toast">コピーしました</div>
<script>
const COURSE_MASTER={
"葛城ゴルフ倶楽部":{courses:{"山名OUT":[4,4,5,3,5,4,3,4,4],"山名IN":[4,3,4,4,4,5,4,3,5],"宇刈OUT":[5,4,3,4,4,3,4,4,5],"宇刈IN":[5,4,3,4,4,3,4,5,4]},layouts:{"山名OUT→山名IN":["山名OUT","山名IN"],"山名IN→山名OUT":["山名IN","山名OUT"],"宇刈OUT→宇刈IN":["宇刈OUT","宇刈IN"],"宇刈IN→宇刈OUT":["宇刈IN","宇刈OUT"]}},
"富嶽カントリークラブ":{courses:{"白鳥":[4,5,4,3,4,4,5,3,4],"宝永":[4,3,4,5,4,4,3,4,5]},layouts:{"白鳥→宝永":["白鳥","宝永"],"宝永→白鳥":["宝永","白鳥"]}},
"リバー富士カントリークラブ":{courses:{"富士":[5,3,4,4,5,4,3,4,4],"甲斐":[4,5,4,4,3,5,4,4,3],"駿河":[4,3,5,4,4,3,4,5,4]},layouts:{"富士→甲斐":["富士","甲斐"],"甲斐→駿河":["甲斐","駿河"],"駿河→富士":["駿河","富士"]}},
"その他 Par72":{courses:{"OUT":[4,4,3,4,5,3,4,4,5],"IN":[4,3,5,4,4,3,4,5,4]},layouts:{"OUT→IN":["OUT","IN"],"IN→OUT":["IN","OUT"]}}
};
const BASE_MANTRAS=["肩と体の回転を止めない","肩と体は水平に回す","手首の角度を保つ","腕の三角形を保つ","切り返しで手を下ろしにいかない","右肘を体に引きつける","アドレスの前傾角を保つ","テークバックはゆっくり","インパクトで左壁","アプローチは体を少し高く保つ","顔を下げすぎない","膝の高さを変えない","左腕はトップで押し込み、右手は引く","体でゆっくり回す","グリップを垂直に握り、それから降ろして構える","アドレス姿勢はスタックで"];
let PARS=[],hole=0,holes=[],round={},mantras=[],mi=0,timer=null;
function $(id){return document.getElementById(id)}function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');scrollTo(0,0);if(id==='home')renderHome()}function toast(s){$('toast').textContent=s;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1600)}
function localDateStr(d=new Date()){const z=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`}
function mkH(){return Array.from({length:18},()=>({rel:0,putts:2,ob:0,pen:0}))}
function getHistory(){try{return JSON.parse(localStorage.miyaGolfRounds||'[]')}catch(e){return[]}}function setHistory(a){localStorage.miyaGolfRounds=JSON.stringify(a)}
function newRound(){$('rDate').value=localDateStr();fillCourses();const saved=localStorage.miyaGolfMantras; $('mantraText').value=saved||BASE_MANTRAS.join('\n');renderChips();show('start')}
function fillCourses(){const c=$('course');c.innerHTML=Object.keys(COURSE_MASTER).map(x=>`<option>${x}</option>`).join('');fillLayouts()}
function fillLayouts(){const m=COURSE_MASTER[$('course').value],l=$('layout');l.innerHTML=Object.keys(m.layouts).map(x=>`<option>${x}</option>`).join('');previewPar()}
function currentPars(){const m=COURSE_MASTER[$('course').value],pair=m.layouts[$('layout').value];return [...m.courses[pair[0]],...m.courses[pair[1]]]}
function previewPar(){const p=currentPars(),o=p.slice(0,9).reduce((a,b)=>a+b,0),i=p.slice(9).reduce((a,b)=>a+b,0);$('parPreview').textContent=`OUT ${o} / IN ${i} / TOTAL ${o+i}`}
function renderChips(){const lines=$('mantraText').value.split('\n').map(s=>s.trim()).filter(Boolean);localStorage.miyaGolfMantras=lines.join('\n');$('chips').innerHTML=lines.map((s,i)=>`<button class="chip ${i<3?'on':''}" onclick="this.classList.toggle('on')">${esc(s)}</button>`).join('')}
function resetMantras(){$('mantraText').value=BASE_MANTRAS.join('\n');renderChips()}
function startRound(){PARS=currentPars();holes=mkH();hole=0;mantras=[...document.querySelectorAll('#chips .chip.on')].map(x=>x.textContent.trim());if(!mantras.length)mantras=['力まない'];round={date:$('rDate').value,course:$('course').value,layout:$('layout').value,type:$('type').value,partners:$('partners').value,parTotal:PARS.reduce((a,b)=>a+b,0),mantras};clearInterval(timer);mi=0;timer=setInterval(()=>{mi=(mi+1)%mantras.length;renderMantra()},5000);renderHole();show('play')}
function renderMantra(){$('mantraNow').textContent=mantras[mi]||'--'}
function scoreLabel(r){if(r<=-2)return'EAGLE 🦅';if(r==-1)return'BIRDIE 🐦';if(r==0)return'PAR';if(r==1)return'BOGEY';if(r==2)return'DOUBLE';return'TRIPLE+'}
function renderHole(){const h=holes[hole];renderMantra();$('holeNo').textContent=hole+1;$('holePar').textContent='Par '+PARS[hole];$('side').textContent=hole<9?'OUT':'IN';$('prog').innerHTML=Array.from({length:18},(_,i)=>`<div class="seg ${i<hole?'done':i==hole?'now':''}"></div>`).join('');$('scoreName').textContent=scoreLabel(h.rel);$('scoreRel').textContent=h.rel==0?'±0':(h.rel>0?'+'+h.rel:h.rel);$('putts').textContent=h.putts;$('ob').textContent=h.ob;$('pen').textContent=h.pen;$('nextBtn').textContent=hole==17?'ラウンド完了 ✓':'次へ →'}
function chgScore(d){holes[hole].rel=Math.max(-4,Math.min(6,holes[hole].rel+d));renderHole()}function chg(k,d){holes[hole][k]=Math.max(0,Math.min(k==='putts'?5:9,holes[hole][k]+d));renderHole()}function prevHole(){if(hole>0){hole--;renderHole()}}function nextHole(){if(hole<17){hole++;renderHole()}else{finish()}}
function finish(){clearInterval(timer);const t=totals();$('outT').textContent=t.out;$('inT').textContent=t.in;$('grossT').textContent=t.gross;$('doneSub').textContent=`${round.course} / ${round.layout} / PAR ${round.parTotal}`;$('scoreCard').innerHTML=scoreTable();show('done')}
function totals(){let out=0,inn=0,putts=0,ob=0,pen=0;holes.forEach((h,i)=>{const s=PARS[i]+h.rel;if(i<9)out+=s;else inn+=s;putts+=h.putts;ob+=h.ob;pen+=h.pen});return{out,in:inn,gross:out+inn,putts,ob,pen}}
function scoreTable(){let html='<table class="table"><tr><th>H</th>';for(let i=1;i<=18;i++)html+=`<th>${i}</th>`;html+='</tr><tr><th>Par</th>';PARS.forEach(p=>html+=`<td>${p}</td>`);html+='</tr><tr><th>Score</th>';holes.forEach((h,i)=>{let c=h.rel<0?'u':h.rel>1?'d':h.rel>0?'o':'';html+=`<td class="${c}">${PARS[i]+h.rel}</td>`});html+='</tr></table>';return html}
function saveRound(){const r=roundData();const a=getHistory().filter(x=>x.id!==r.id);a.unshift(r);setHistory(a);toast('保存しました')}
function roundData(){const t=totals();return{id:round.date+'_'+round.course+'_'+round.layout+'_'+Date.now(),...round,holes,totals:t,memo:$('memo').value,createdAt:new Date().toISOString()}}
function renderHome(){const a=getHistory();if(!a.length){$('best').textContent='--';$('avg5').textContent='--';$('monthCount').textContent='0';$('monthSub').textContent='まだ記録なし';$('recent').innerHTML='<div class="small">まだ保存されたラウンドはありません</div>';return}const best=a.reduce((x,y)=>x.totals.gross<=y.totals.gross?x:y);$('best').textContent=best.totals.gross;$('bestSub').textContent=best.course+' '+best.date;const five=a.slice(0,5);$('avg5').textContent=(five.reduce((s,r)=>s+r.totals.gross,0)/five.length).toFixed(1);const ym=new Date().toISOString().slice(0,7);const m=a.filter(r=>r.date&&r.date.slice(0,7)===ym);$('monthCount').textContent=m.length;$('monthSub').textContent=`コンペ ${m.filter(r=>r.type==='コンペ').length} / 練習 ${m.filter(r=>r.type!=='コンペ').length}`;$('recent').innerHTML=a.slice(0,5).map(r=>`<div class="round"><div><b>${esc(r.course)}</b><div class="small">${r.date} / ${esc(r.layout)} <span class="badge">${esc(r.type)}</span></div></div><div class="score">${r.totals.gross}</div></div>`).join('')}
function md(r){const h=r.holes,t=r.totals;let s=`---\ntype: golf_round\ndate: ${r.date}\ncourse: ${r.course}\nlayout: ${r.layout}\nround_type: ${r.type}\npar_total: ${r.parTotal}\ngross: ${t.gross}\nout: ${t.out}\nin: ${t.in}\nputts: ${t.putts}\nob: ${t.ob}\npenalty: ${t.pen}\ntags: [golf, ${r.course.replaceAll(' ','')}]\n---\n\n# ${r.date} ${r.course}\n\n- レイアウト: ${r.layout}\n- 種別: ${r.type}\n- 同伴者: ${r.partners||'-'}\n- PAR: ${r.parTotal}\n- OUT: ${t.out}\n- IN: ${t.in}\n- GROSS: ${t.gross}\n- Putts: ${t.putts}\n- OB: ${t.ob}\n- ワンペナ: ${t.pen}\n\n## 今日のマントラ\n${(r.mantras||[]).map(x=>'- '+x).join('\n')}\n\n## スコアカード\n\n| H | Par | Score | Putts | OB | 1P |\n|---:|---:|---:|---:|---:|---:|\n`;h.forEach((x,i)=>{s+=`| ${i+1} | ${PARS[i]||''} | ${(PARS[i]||0)+x.rel} | ${x.putts} | ${x.ob} | ${x.pen} |\n`});s+=`\n## 反省メモ\n${r.memo||''}\n`;return s}
function copyMd(){navigator.clipboard.writeText(md(roundData())).then(()=>toast('Markdownをコピーしました'))}
function exportAllMd(){const a=getHistory();if(!a.length)return toast('履歴がありません');navigator.clipboard.writeText(a.map(r=>mdForSaved(r)).join('\n\n---\n\n')).then(()=>toast('全履歴をコピーしました'))}
function mdForSaved(r){const oldP=PARS;PARS=parFromRound(r);const s=md(r);PARS=oldP;return s}
function parFromRound(r){const m=COURSE_MASTER[r.course];if(!m)return Array(18).fill(4);const pair=m.layouts[r.layout];return pair?[...m.courses[pair[0]],...m.courses[pair[1]]]:Array(18).fill(4)}
function downloadMd(){const r=roundData(),blob=new Blob([md(r)],{type:'text/markdown'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${r.date}_${r.course}_${r.layout}.md`.replace(/[\\/:*?"<>|]/g,'_');a.click();URL.revokeObjectURL(a.href)}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
renderHome();
</script>
</body>
</html>
